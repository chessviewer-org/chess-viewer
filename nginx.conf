server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (ported from vercel.json) ----------------------
    # IMPORTANT nginx gotcha: `add_header` is NOT inherited into any `location`
    # that declares its own `add_header`. So every location below that needs to
    # set a `Cache-Control` (or any header) re-declares the full security header
    # set via the `security_headers` map-free pattern: we repeat them inline.
    # Dropping CSP / nosniff / HSTS on the JS/CSS/SW/manifest responses would be
    # a security regression — keep all blocks in sync. (CLAUDE.md §5.9)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'sha256-MfCD8tKFaunlLwiUMRwNa299YZX6MVljms0s3U4l3OU='; font-src 'self'; img-src 'self' data: blob: https://lichess1.org; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://lichess1.org; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # The Service Worker and its registration manifest must NEVER be cached
    # immutably: the browser has to re-fetch them to pick up a new deploy.
    # Without this, the `\.js$` rule below would mark sw.js immutable for 7d
    # and pin users to a stale Service Worker. (exact match wins over regex)
    # Security headers are repeated here because this block's own `add_header`
    # for Cache-Control would otherwise suppress the inherited server-level set.
    location = /sw.js {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'sha256-MfCD8tKFaunlLwiUMRwNa299YZX6MVljms0s3U4l3OU='; font-src 'self'; img-src 'self' data: blob: https://lichess1.org; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://lichess1.org; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'sha256-MfCD8tKFaunlLwiUMRwNa299YZX6MVljms0s3U4l3OU='; font-src 'self'; img-src 'self' data: blob: https://lichess1.org; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://lichess1.org; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'sha256-MfCD8tKFaunlLwiUMRwNa299YZX6MVljms0s3U4l3OU='; font-src 'self'; img-src 'self' data: blob: https://lichess1.org; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://lichess1.org; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'sha256-MfCD8tKFaunlLwiUMRwNa299YZX6MVljms0s3U4l3OU='; font-src 'self'; img-src 'self' data: blob: https://lichess1.org; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://lichess1.org; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
