name: Feature Request
description: Suggest an improvement or new capability
title: '[Feature]: '
labels: ['enhancement', 'needs-review']

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The limitation or pain point you're hitting today.
      placeholder: PNG exports get pixelated when scaled up for print.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should happen? A rough idea is fine.
      placeholder: Add an "SVG" option to the export dropdown.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area (optional)
      description: Which part of the app would this touch? Leave blank if unsure.
      options:
        - Board editor / drag & drop
        - FEN input or history
        - Image export (PNG / JPEG / SVG)
        - Database search
        - Accounts / cloud sync
        - Theme / appearance
        - Other / not sure

  - type: textarea
    id: context
    attributes:
      label: Context (optional)
      description: Mockups, links, examples, or alternatives you considered.

  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I searched existing requests and this is not a duplicate.
          required: true
