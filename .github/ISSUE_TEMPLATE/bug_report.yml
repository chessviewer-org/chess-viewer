name: Bug Report
description: Something is broken or not working as expected
title: '[Bug]: '
labels: ['bug', 'needs-triage']

body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
      placeholder: Pieces disappear after exporting to PNG. Expected the full board with all pieces.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Paste FEN: rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1
        2. Open Export panel → PNG → 4×
        3. Click Download
        4. Open the file — pieces are missing
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area (optional)
      description: Which part of the app? Leave blank if unsure.
      options:
        - Board editor / drag & drop
        - FEN input or history
        - Image export (PNG / JPEG / SVG)
        - Database search
        - Accounts / cloud sync
        - Theme / appearance
        - Other / not sure

  - type: input
    id: environment
    attributes:
      label: Browser & OS
      description: Include version if known.
      placeholder: Chrome 125 on Windows 11 / Safari 17 on iOS 17
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: Open DevTools (F12 / Cmd+Opt+I) → Console and paste any red errors.
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
