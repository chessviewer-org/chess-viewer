name: Bug Report
description: Something is broken or not working as expected
title: '[Bug]: '
labels: ['bug', 'needs-triage']

body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
      placeholder: Pieces disappear after exporting to PNG. Expected the full board.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Enter FEN ...
        2. Click Export
        3. ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser & OS
      description: Helps us reproduce. Include versions if known.
      placeholder: Chrome 121 on Windows 11 / Safari 17 on iOS
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: Open DevTools (F12) → Console and paste any red errors.
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
