# Single source of truth for repository labels.
# Synced to GitHub by .github/workflows/label-sync.yml whenever this file
# changes on master. Edit here, not in the GitHub UI.
# Color palette mirrors freeCodeCamp's label system.

# --- Type ---
- name: bug
  color: b60205
  description: Something is not working correctly
- name: enhancement
  color: 5319e7
  description: New feature or improvement
- name: documentation
  color: 0075ca
  description: Documentation only
- name: performance
  color: FBCA04
  description: Performance improvement
- name: refactor
  color: c5def5
  description: Code restructuring with no behavior change
- name: tests
  color: 006400
  description: Adding or updating tests
- name: dependencies
  color: d4c5f9
  description: Dependency updates (Renovate / Dependabot)
- name: chore
  color: e4e669
  description: Tooling, config, and maintenance
- name: security
  color: b60205
  description: Security fix or vulnerability

# --- Status ---
- name: 'status: waiting triage'
  color: d93f0b
  description: Needs review to confirm validity and reproduction
- name: 'status: waiting review'
  color: d93f0b
  description: Ready for maintainer review
- name: 'status: waiting update'
  color: FBCA04
  description: Awaiting update or response from the author
- name: 'status: in progress'
  color: 5319e7
  description: Actively being worked on
- name: 'status: blocked'
  color: b60205
  description: Cannot proceed — depends on another issue or external factor
- name: 'status: on the roadmap'
  color: 006400
  description: Planned for a future release
- name: 'status: discussing'
  color: 0052cc
  description: Under active discussion
- name: 'status: wontfix'
  color: 000000
  description: Intentional — will not be addressed

# --- Scope ---
- name: 'scope: mobile'
  color: 4969c1
  description: Affects mobile and touch viewports
- name: 'scope: desktop'
  color: 4969c1
  description: Affects desktop viewports only
- name: 'scope: a11y'
  color: 4969c1
  description: Keyboard navigation, ARIA, screen reader support
- name: 'scope: UI'
  color: 4969c1
  description: UX changes and improvements to the user interface
- name: 'scope: breaking'
  color: b60205
  description: Introduces a breaking change

# --- Area ---
- name: 'area: board'
  color: 59d683
  description: Board rendering and drag-and-drop
- name: 'area: fen'
  color: 59d683
  description: FEN parsing and input
- name: 'area: export'
  color: 59d683
  description: Canvas and SVG export pipeline
- name: 'area: auth'
  color: 59d683
  description: Authentication, Supabase, and cloud sync
- name: 'area: history'
  color: 59d683
  description: FEN history
- name: 'area: ui'
  color: 59d683
  description: Shared UI components, layout, and theming
- name: 'area: settings'
  color: 59d683
  description: Settings pages
- name: 'area: ci'
  color: 59d683
  description: CI pipelines, hooks, and tooling

# --- Resolution ---
- name: duplicate
  color: cfd3d7
  description: Already reported or requested
- name: invalid
  color: e4e669
  description: Does not reproduce or is off-topic
- name: 'good first issue'
  color: 5319e7
  description: Well-scoped for a first contribution
- name: 'help wanted'
  color: 006400
  description: Open for contributions
- name: deprioritized
  color: e99695
  description: Low priority — lacks enough detail or impact to act on now
