# Auto-applies "area:" labels to PRs based on which files changed.
# Consumed by actions/labeler in .github/workflows/labeler.yml.
# Syntax reference: https://github.com/actions/labeler

'area: board':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/components/board/**'
          - 'src/components/interactions/**'

'area: fen':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/shared/utils/fenParser.ts'
          - 'src/shared/utils/fenParser.test.ts'
          - 'src/components/panels/Fen/**'

'area: export':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/shared/utils/canvas*.ts'
          - 'src/shared/utils/svgExporter.ts'
          - 'src/shared/utils/workerRasterExport.ts'
          - 'src/shared/utils/imageOptimizer.ts'
          - 'src/shared/utils/exportState.ts'
          - 'src/shared/utils/dpiEncoder.ts'
          - 'src/shared/utils/archiveManager.ts'
          - 'src/shared/workers/**'
          - 'src/pages/AdvancedFENInputPage/**'

'area: auth':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/features/auth/**'
          - 'supabase/**'

'area: history':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/pages/FENHistoryPage/**'
          - 'src/shared/hooks/useFENHistory*'
          - 'src/shared/utils/historyUtils.ts'

'area: ui':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/components/layout/**'
          - 'src/shared/ui/**'
          - 'src/contexts/ThemeSettingsContext.tsx'
          - 'src/pages/settings/**'
          - 'src/index.css'

'area: settings':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/pages/settings/**'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'pnpm-lock.yaml'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'

'area: ci':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '.husky/**'
          - 'dangerfile.js'
          - 'scripts/**'
