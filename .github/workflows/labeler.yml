name: PR Labeler

# Auto-labels pull requests:
#   1. area/type/dependency labels from changed file paths (actions/labeler)
#   2. a type label derived from the Conventional Commit PR title
#
# Uses pull_request_target so labeling also works for PRs from forks. This
# event runs with the base repo's token; we never check out or run PR code here.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  paths:
    name: Label by changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  type:
    name: Label by PR title
    runs-on: ubuntu-latest
    steps:
      - name: Map Conventional Commit type to a label
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const match = title.match(/^(\w+)(?:\([^)]*\))?!?:/);
            if (!match) return;

            const map = {
              feat: 'enhancement',
              fix: 'bug',
              docs: 'documentation',
              perf: 'performance',
              refactor: 'refactor',
              test: 'tests',
              build: 'dependencies',
              ci: 'area: ci',
              chore: 'chore',
            };

            const label = map[match[1].toLowerCase()];
            if (!label) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });
