name: PR Labeler

# Auto-labels pull requests:
#   1. area: labels from changed file paths  (actions/labeler, sync-labels off
#      so manually applied labels are never stripped)
#   2. type label derived from the Conventional Commit PR title
#   3. scope: breaking when title contains a !
#   4. status: waiting triage on every newly opened PR
#
# Uses pull_request_target so labeling works for fork PRs.
# The base repo token is used; PR code is never checked out.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  paths:
    name: Label by changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false

  type:
    name: Label by PR title
    runs-on: ubuntu-latest
    steps:
      - name: Map Conventional Commit type to label
        uses: actions/github-script@v8
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const match = title.match(/^(\w+)(?:\([^)]*\))?!?:/);
            if (!match) return;

            const map = {
              feat:     'enhancement',
              fix:      'bug',
              docs:     'documentation',
              perf:     'performance',
              refactor: 'refactor',
              test:     'tests',
              build:    'dependencies',
              ci:       'area: ci',
              chore:    'chore',
              style:    'chore',
              revert:   'bug',
            };

            const label = map[match[1].toLowerCase()];
            if (label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [label],
              });
            }

            if (title.match(/^(\w+)(?:\([^)]*\))?!:/)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['scope: breaking'],
              });
            }

  triage:
    name: Mark new PRs for triage
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['status: waiting triage'],
            });
