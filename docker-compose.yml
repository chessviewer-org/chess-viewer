services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: chess-viewer:latest
    container_name: chess-viewer-web
    ports:
      - '3000:8080'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1'
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  dev:
    profiles: ['dev']
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: chess-viewer-dev
    ports:
      - '5173:5173'
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - chess-viewer-node-modules:/app/node_modules
    restart: unless-stopped

volumes:
  chess-viewer-node-modules:
