<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="ChessVision" />
    <meta
      name="google-site-verification"
      content="JOQDA_IVktrTpKqQ6hedH3jk7ixrSYA_WZMT5QLSOOU"
    />

    <!-- prerender:strip:start -->
    <meta
      name="description"
      content="Free chess diagram generator — convert FEN to PNG, JPEG, or SVG in seconds. Professional-quality chess diagrams for books, articles, and social media. No sign-up required."
    />
    <meta
      name="keywords"
      content="chess diagram generator, FEN to image, FEN to PNG, chess diagram maker, chess FEN converter, chess position image, chessvision, chess diagram export, FEN to SVG"
    />

    <!--
      Static SEO / social-sharing fallbacks for the home route. These are the
      tags non-JS crawlers (Twitter, Facebook, LinkedIn, WhatsApp, Slack) read
      before any JavaScript runs. The `<Seo>` component overrides them
      per route at runtime, and the build-time prerender step bakes the correct
      per-route tags into each page's HTML. Keep these in sync with the home
      entry of src/shared/constants/seoConstants.ts.
    -->
    <link rel="canonical" href="https://chessvision.org/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ChessVision" />
    <meta
      property="og:title"
      content="ChessVision — Free Chess Diagram Generator"
    />
    <meta
      property="og:description"
      content="Convert FEN to high-resolution PNG, JPEG, or SVG chess diagrams instantly. Free, open-source, no sign-up. Professional output for books, articles, and social media."
    />
    <meta property="og:url" content="https://chessvision.org/" />
    <meta property="og:image" content="https://chessvision.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="ChessVision — Chess Diagram Generator"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@chessvision_org" />
    <meta
      name="twitter:title"
      content="ChessVision — Free Chess Diagram Generator"
    />
    <meta
      name="twitter:description"
      content="Convert FEN to high-resolution PNG, JPEG, or SVG chess diagrams instantly. Free, open-source, no sign-up required."
    />
    <meta name="twitter:image" content="https://chessvision.org/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="ChessVision chess diagram generator preview"
    />
    <!-- prerender:strip:end -->

    <!-- Favicons and Icons -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#111827" />

    <!--
      CRITICAL CSS — paints the themed body background on first paint to
      eliminate the white flash (FOUC) on hard refresh, before the external
      stylesheet (~109KB, render-blocking) has loaded. `theme-init.js` sets
      `data-theme` synchronously below, so the correct color is chosen before
      the first paint. RGB values mirror `--val-bg`/gradient tokens in
      src/index.css; the external stylesheet takes over seamlessly once loaded.
    -->
    <style>
      html {
        background-color: rgb(15 15 20);
      }
      html[data-theme='light'] {
        background-color: rgb(248 249 252);
      }
      body {
        margin: 0;
        min-height: 100vh;
        background-color: rgb(15 15 20);
        background-image: linear-gradient(135deg, rgb(18 18 24), rgb(12 12 16));
        background-attachment: fixed;
      }
      html[data-theme='light'] body {
        background-color: rgb(248 249 252);
        background-image: linear-gradient(
          135deg,
          rgb(250 251 254),
          rgb(243 244 248)
        );
      }

      /*
        APP SPLASH — shown only on the very first visit (before the Service
        Worker has cached the bundle). It paints a branded spinner over the
        themed background so the user never sees a blank screen while the
        ~1.3MB bundle downloads. React replaces #root on mount, removing the
        splash with it; #app-splash also fades out via the .app-ready class
        set in src/App once the tree is interactive.
      */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2147483647;
        opacity: 1;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }
      html.app-ready #app-splash {
        opacity: 0;
      }
      #app-splash .app-splash-spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgb(255 255 255 / 0.15);
        border-top-color: rgb(59 130 246);
        animation: app-splash-spin 0.8s linear infinite;
      }
      html[data-theme='light'] #app-splash .app-splash-spinner {
        border-color: rgb(0 0 0 / 0.1);
        border-top-color: rgb(59 130 246);
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .app-splash-spinner {
          animation-duration: 1.6s;
        }
      }
    </style>

    <!--
      Fonts are SELF-HOSTED: Inter (variable) is bundled via
      @fontsource-variable/inter (imported in src/index.tsx) and served from our
      own origin. No Google Fonts request — privacy-first, no third-party
      network call, no FOUC / font-swap drift across loads, and no font-src CSP
      entry needed for external hosts.
    -->

    <title>ChessVision — Free Chess Diagram Generator</title>
  </head>
  <body class="preload">
    <script src="/theme-init.js"></script>

    <div id="root"></div>

    <!-- First-paint splash; removed once the app is interactive (see src/App). -->
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash-spinner"></div>
    </div>

    <script type="module" src="/src/index.tsx"></script>
    <script src="/preload-cleanup.js" defer></script>
  </body>
</html>
